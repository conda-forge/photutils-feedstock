{% set name = "photutils" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/photutils/photutils-{{ version }}.tar.gz
  sha256: 5e1ca2be9433e1e1f9f6d477e1e6c8029755caceefb4e349048955e3cb825529

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: true  # [py<311]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython >=3.1.2,<4                      # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - setuptools >=77.0
    - setuptools_scm >=8.1
    - cython >=3.1.2,<4
    - extension-helpers >=1.3,<2
    - astropy-base >=6.1.4
    - numpy
  run:
    - python
    - numpy >=2.0
    - astropy-base >=6.1.4
    - scipy >=1.13
    - matplotlib-base >=3.9
    - regions >=0.9
    - scikit-image >=0.23
    - gwcs >=0.20
    - bottleneck >=1.4
    - tqdm >=4.66
    - rasterio >=1.4
    - shapely >=2.0

test:
  requires:
    - pytest-astropy
  imports:
    - photutils
    - photutils.aperture
    - photutils.background
    - photutils.centroids
    - photutils.datasets
    - photutils.detection
    - photutils.geometry
    - photutils.isophote
    - photutils.morphology
    - photutils.profiles
    - photutils.psf
    - photutils.psf.matching
    - photutils.segmentation
    - photutils.utils

about:
  home: https://photutils.readthedocs.io/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.rst
  summary: An Astropy package for photometry
  description: |
    Photutils is an Astropy package for detection and photometry of
    astronomical sources.
  doc_url: https://photutils.readthedocs.io/
  dev_url: https://github.com/astropy/photutils

extra:
  recipe-maintainers:
    - larrybradley
    - bsipocz
    - mwcraig
